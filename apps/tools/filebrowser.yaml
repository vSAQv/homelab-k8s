# apps/tools/filebrowser.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: filebrowser
  template:
    metadata:
      labels:
        app: filebrowser
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:latest
          args: ["--database", "/config/database.db", "--root", "/srv"]
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: data
              mountPath: /srv
            - name: config
              mountPath: /config
      volumes:
        - name: data
          hostPath:
            path: /home/cif/homelab/data
            type: Directory
        - name: config
          hostPath:
            path: /home/cif/homelab/config/filebrowser
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 80
  selector:
    app: filebrowser
