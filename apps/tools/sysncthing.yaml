# apps/tools/syncthing.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncthing
  template:
    metadata:
      labels:
        app: syncthing
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
      containers:
        - name: syncthing
          image: lscr.io/linuxserver/syncthing:latest
          ports:
            - containerPort: 8384
            - containerPort: 22000
            - containerPort: 22000
              protocol: UDP
            - containerPort: 21027
              protocol: UDP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "100"
            - name: TZ
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: TZ
          volumeMounts:
            - name: config
              mountPath: /config
            - name: saves
              mountPath: /saves
      volumes:
        - name: config
          hostPath:
            path: /home/cif/homelab/config/syncthing
            type: DirectoryOrCreate
        - name: saves
          hostPath:
            path: /home/cif/homelab/data/saves
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: syncthing
spec:
  type: LoadBalancer
  ports:
    - port: 8384
      targetPort: 8384
      name: webui
    - port: 22000
      targetPort: 22000
      name: tcp-sync
    - port: 22000
      targetPort: 22000
      protocol: UDP
      name: udp-sync
    - port: 21027
      targetPort: 21027
      protocol: UDP
      name: discovery
  selector:
    app: syncthing
