# apps/immich/ml.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      nodeSelector:
        hardware.vram: "true"
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:release
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          env:
            - name: TZ
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: TZ
            - name: DB_HOSTNAME
              value: "immich-db"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_DATABASE_NAME
              value: "immich"
            - name: REDIS_HOSTNAME
              value: "immich-redis"
            - name: MACHINE_LEARNING_WORKERS
              value: "1"
            - name: MACHINE_LEARNING_WORKERS_TIMEOUT
              value: "120"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: IMMICH_DB_PASSWORD
          volumeMounts:
            - name: cache
              mountPath: /cache
      volumes:
        - name: cache
          hostPath:
            path: /home/cif/homelab/config/immich-cache
            type: DirectoryOrCreate
