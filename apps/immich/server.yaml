# apps/immich/server.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-server
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-server
  template:
    metadata:
      labels:
        app: immich-server
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
      containers:
        - name: immich-server
          image: ghcr.io/immich-app/immich-server:release
          ports:
            - containerPort: 2283
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: TZ
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: TZ
            - name: DB_HOSTNAME
              value: "immich-db"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_DATABASE_NAME
              value: "immich"
            - name: REDIS_HOSTNAME
              value: "immich-redis"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: IMMICH_DB_PASSWORD
          volumeMounts:
            - name: upload
              mountPath: /usr/src/app/upload
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: upload
          hostPath:
            path: /home/cif/homelab/data/photos/upload
            type: DirectoryOrCreate
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
---
apiVersion: v1
kind: Service
metadata:
  name: immich-server
spec:
  type: LoadBalancer
  ports:
    - port: 2283
      targetPort: 2283
  selector:
    app: immich-server
