---
# apps/monitoring/openobserve.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openobserve
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openobserve
  template:
    metadata:
      labels:
        app: openobserve
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: openobserve
          image: public.ecr.aws/zinclabs/openobserve:latest
          ports:
            - containerPort: 5080
              name: http
          env:
            - name: ZO_ROOT_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: OO_ROOT_USER_EMAIL
            - name: ZO_ROOT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: OO_ROOT_USER_PASSWORD
            - name: ZO_DATA_DIR
              value: "/data"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /home/cif/homelab/config/openobserve/data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: openobserve
  namespace: default
spec:
  type: LoadBalancer
  ports:
    - port: 5080
      targetPort: 5080
      protocol: TCP
  selector:
    app: openobserve
