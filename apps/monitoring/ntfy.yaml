---
# apps/monitoring/ntfy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy
  template:
    metadata:
      labels:
        app: ntfy
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /var/cache/ntfy"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: cache
              mountPath: /var/cache/ntfy
      containers:
        - name: ntfy
          image: binwiederhier/ntfy:latest
          command: ["ntfy", "serve"]
          env:
            - name: NTFY_AUTH_USERS
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: NTFY_AUTH_USERS
            - name: NTFY_AUTH_ACCESS
              value: "monitoring_bot:alerts:write-only"
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy/server.yml
              subPath: server.yml
            - name: cache
              mountPath: /var/cache/ntfy
      volumes:
        - name: config
          configMap:
            name: ntfy-config
        - name: cache
          hostPath:
            path: /home/cif/homelab/config/ntfy/cache
            type: DirectoryOrCreate
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-config
  namespace: default
data:
  server.yml: |
    base-url: "http://192.168.1.42:18086"
    listen-http: ":80"
    cache-file: "/var/cache/ntfy/cache.db"
    upstream-dest: "https://ntfy.sh"
    auth-file: "/var/cache/ntfy/user.db"
    auth-default-access: "deny-all"
    enable-login: true
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  namespace: default
spec:
  type: LoadBalancer
  ports:
    - port: 18086
      targetPort: 80
      protocol: TCP
  selector:
    app: ntfy
