---
# apps/monitoring/vector.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vector
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vector
subjects:
  - kind: ServiceAccount
    name: vector
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-config
  namespace: default
data:
  vector.yaml: |
    data_dir: "/var/lib/vector"
    sources:
      kubernetes_logs:
        type: "kubernetes_logs"
    sinks:
      openobserve:
        type: "http"
        inputs:
          - "kubernetes_logs"
        # Internal cluster service endpoint
        uri: "http://openobserve:5080/api/default/default/_json"
        method: "post"
        auth:
          strategy: "basic"
          user: "${OO_ROOT_USER_EMAIL}"
          password: "${OO_ROOT_USER_PASSWORD}"
        compression: "gzip"
        encoding:
          codec: "json"
          timestamp_format: "rfc3339"
        healthcheck:
          enabled: false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vector
  namespace: default
spec:
  selector:
    matchLabels:
      app: vector
  template:
    metadata:
      labels:
        app: vector
    spec:
      serviceAccountName: vector
      containers:
        - name: vector
          image: timberio/vector:0.35.0-alpine
          env:
            - name: VECTOR_SELF_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: OO_ROOT_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: OO_ROOT_USER_EMAIL
            - name: OO_ROOT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homelab-secrets
                  key: OO_ROOT_USER_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /etc/vector
            - name: data
              mountPath: /var/lib/vector
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlib
              mountPath: /var/lib
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: config
          configMap:
            name: vector-config
        - name: data
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlib
          hostPath:
            path: /var/lib
